name: Build Executables

on:
  push:
    tags:
      - 'v*'           # Triggers on version tags: v1.0, v1.2.3, etc.
  workflow_dispatch:   # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ApiAutomation.exe
            asset_name: ApiAutomation-Windows.exe
          - os: macos-latest
            artifact_name: ApiAutomation
            asset_name: ApiAutomation-macOS

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Build (Windows) ────────────────────────────────────────────────────
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile `
            --name ApiAutomation `
            --add-data "data;data" `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.utils `
            --hidden-import pandas `
            --hidden-import aiohttp `
            --hidden-import dotenv `
            src/main.py

      # ── Build (macOS / Linux) ──────────────────────────────────────────────
      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile \
            --name ApiAutomation \
            --add-data "data:data" \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            --hidden-import pandas \
            --hidden-import aiohttp \
            --hidden-import dotenv \
            src/main.py

      # ── Upload artifact for this OS ────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30

  # ── Create GitHub Release with both binaries ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ApiAutomation-Windows.exe
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ApiAutomation-macOS
          path: artifacts/

      - name: Rename artifacts
        run: |
          mv artifacts/ApiAutomation.exe artifacts/ApiAutomation-Windows.exe
          mv artifacts/ApiAutomation     artifacts/ApiAutomation-macOS
          chmod +x artifacts/ApiAutomation-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "API Automation Framework ${{ github.ref_name }}"
          body: |
            ## 🚀 API Automation Framework ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `ApiAutomation-Windows.exe` |
            | 🍎 macOS   | `ApiAutomation-macOS` |

            ### Usage
            **Windows:**
            ```
            ApiAutomation-Windows.exe data\input\TestSuite_REST.json
            ApiAutomation-Windows.exe data\input\TestSuite_REST.json data\input\TestSuite_SOAP.json --parallel
            ```

            **macOS:**
            ```bash
            chmod +x ApiAutomation-macOS
            ./ApiAutomation-macOS data/input/TestSuite_REST.json
            ./ApiAutomation-macOS data/input/TestSuite_REST.json data/input/TestSuite_SOAP.json --parallel
            ```

            ### Requirements
            - Copy `.env.example` to `.env` and fill in your credentials
            - Place test suite files in `data/input/` (filename must contain `_REST` or `_SOAP`)
          files: |
            artifacts/ApiAutomation-Windows.exe
            artifacts/ApiAutomation-macOS
          draft: false
          prerelease: false
